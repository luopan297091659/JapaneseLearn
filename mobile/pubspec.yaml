name: japanese_learn
description: 言旅 Kotabi — Japanese Learning App
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Navigation
  go_router: ^13.2.0

  # Network
  dio: ^5.4.0
  retrofit: ^4.1.0

  # Local Storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2
  sqflite: ^2.3.2
  path_provider: ^2.1.2

  # Audio
  just_audio: ^0.9.36
  audio_service: ^0.18.12
  flutter_tts: ^4.0.2

  # UI
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  lottie: ^3.0.0
  fl_chart: ^0.66.2
  shimmer: ^3.0.0
  flutter_card_swiper: ^6.0.0
  confetti: ^0.7.0

  # Japanese Text
  ruby_text: ^3.0.0+1

  # Utils
  intl: ^0.19.0
  uuid: ^4.3.3
  logger: ^2.1.0
  connectivity_plus: ^5.0.2
  permission_handler: ^11.3.0
  file_picker: ^8.1.2
  archive: ^3.4.10
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  riverpod_generator: ^2.3.9
  build_runner: ^2.4.8
  json_serializable: ^6.7.1
  retrofit_generator: ^8.1.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#0F1946"
  adaptive_icon_foreground: "assets/images/app_icon.png"
  min_sdk_android: 24

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/audio/
    - assets/lottie/
